<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Deckdown">
  <defs>
    <linearGradient id="dd-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#3b6fe0"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7.5" fill="url(#dd-bg)"/>
  <!-- back slide (depth) -->
  <rect x="6.5" y="8" width="15" height="11" rx="2.2" fill="#ffffff" opacity="0.42"/>
  <!-- front slide -->
  <rect x="10" y="12.5" width="15" height="11" rx="2.2" fill="#ffffff"/>
  <!-- content lines on the front slide -->
  <rect x="12.6" y="15.7" width="8.6" height="1.9" rx="0.95" fill="#3b6fe0"/>
  <rect x="12.6" y="19.1" width="6.2" height="1.6" rx="0.8" fill="#9db6f2"/>
</svg>
